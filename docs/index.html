<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SGVA – Oportunidades SENA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2230;
      --accent: #39d98a; --accent2: #5b8cff; --danger: #ff5b5b;
      --text: #e8eaf0; --muted: #6b7280; --card: #13161f;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(57,217,138,.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(91,140,255,.10) 0%, transparent 60%);
      animation: pulse-bg 8s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    @keyframes pulse-bg { from { opacity: .6; } to { opacity: 1; } }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(57,217,138,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,217,138,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px; padding: 2rem;
      animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2.5rem;
      box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(57,217,138,.06);
    }
    .logo-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(57,217,138,.1); border: 1px solid rgba(57,217,138,.25);
      border-radius: 99px; padding: .35rem .9rem; margin-bottom: 1.8rem;
    }
    .logo-dot {
      width: 8px; height: 8px; background: var(--accent);
      border-radius: 50%; animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .logo-badge span {
      font-family: 'Syne', sans-serif; font-size: .72rem;
      font-weight: 700; letter-spacing: .12em; color: var(--accent); text-transform: uppercase;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; line-height: 1.15; margin-bottom: .6rem; }
    h1 em { font-style: normal; color: var(--accent); }
    .subtitle { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 2rem; }
    label { display: block; font-size: .8rem; font-weight: 500; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: .5rem; }
    input[type="text"] {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: .85rem 1.1rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(57,217,138,.12); }
    .btn-login {
      width: 100%; margin-top: 1.4rem; background: var(--accent); color: #0a0c10;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 12px; padding: .95rem; cursor: pointer;
      letter-spacing: .03em; transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 24px rgba(57,217,138,.25);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(57,217,138,.4); }
    .error-msg { margin-top: .8rem; color: var(--danger); font-size: .85rem; text-align: center; display: none; }
    .divider { height: 1px; background: var(--border); margin: 1.8rem 0; }
    .footer-note { text-align: center; font-size: .78rem; color: var(--muted); }
    .footer-note strong { color: var(--accent2); font-weight: 500; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-badge"><div class="logo-dot"></div><span>SGVA · SENA</span></div>
      <h1>Bienvenido a<br><em>Oportunidades</em></h1>
      <p class="subtitle">Ingresa tu nombre para acceder al listado de empresas y gestionar tu proceso de aplicación.</p>
      <label for="nombre">Tu nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej: Luis David Yate Pulido" autocomplete="off" />
      <p class="error-msg" id="error">Por favor escribe tu nombre para continuar.</p>
      <button class="btn-login" onclick="ingresar()">Ingresar al sistema →</button>
      <div class="divider"></div>
      <p class="footer-note">Sistema de Gestión de Visitas y Aplicaciones<br><strong>ADSO · Formación SENA 2026</strong></p>
    </div>
  </div>
  <script>
    const sesion = localStorage.getItem('sgva_usuario');
    if (sesion) window.location.href = 'dashboard.html';
    document.getElementById('nombre').addEventListener('keydown', e => { if (e.key === 'Enter') ingresar(); });
    function ingresar() {
      const nombre = document.getElementById('nombre').value.trim();
      const error  = document.getElementById('error');
      if (!nombre) { error.style.display = 'block'; return; }
      error.style.display = 'none';
      localStorage.setItem('sgva_usuario', nombre);
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
