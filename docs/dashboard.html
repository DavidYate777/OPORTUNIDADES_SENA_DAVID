<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SGVA – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2230;
      --accent: #39d98a; --accent2: #5b8cff; --warn: #f5a623;
      --danger: #ff5b5b; --text: #e8eaf0; --muted: #6b7280;
      --card: #13161f; --card2: #0f1117;
      --st-proceso: #f5a623; --st-finalizado: #5b8cff;
      --st-contratado: #39d98a; --st-pendiente: #6b7280;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 40% at 5% 0%, rgba(57,217,138,.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 95% 100%, rgba(91,140,255,.07) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,12,16,.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .logo-pill {
      display: flex; align-items: center; gap: .5rem;
      background: rgba(57,217,138,.1); border: 1px solid rgba(57,217,138,.25);
      border-radius: 99px; padding: .28rem .75rem;
    }
    .logo-dot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .logo-pill span { font-family:'Syne',sans-serif; font-size:.68rem; font-weight:700; letter-spacing:.1em; color:var(--accent); text-transform:uppercase; }
    .header-title { font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700; }
    .header-title small { font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:400; color:var(--muted); display:block; }
    .header-right { display:flex; align-items:center; gap:1rem; }
    .user-chip { display:flex; align-items:center; gap:.6rem; background:var(--surface); border:1px solid var(--border); border-radius:99px; padding:.3rem .9rem .3rem .4rem; }
    .user-avatar { width:30px; height:30px; border-radius:50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:.75rem; font-weight:800; color:#0a0c10; }
    .user-name { font-size:.85rem; font-weight:500; max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .btn-salir { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.82rem; border-radius:8px; padding:.38rem .85rem; cursor:pointer; transition: color .15s, border-color .15s; }
    .btn-salir:hover { color:var(--danger); border-color:var(--danger); }
    main { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:2rem 2rem 4rem; }
    .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; animation: fadeIn .5s .1s both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.1rem 1.3rem; display:flex; flex-direction:column; gap:.3rem; transition:border-color .2s; }
    .stat-card:hover { border-color:rgba(57,217,138,.3); }
    .stat-label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-weight:500; }
    .stat-value { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; }
    .stat-value.green{color:var(--accent)} .stat-value.blue{color:var(--accent2)} .stat-value.orange{color:var(--warn)} .stat-value.grey{color:var(--muted)}
    .controls { display:flex; gap:.75rem; flex-wrap:wrap; align-items:center; margin-bottom:1.5rem; animation:fadeIn .5s .2s both; }
    .search-box { flex:1; min-width:220px; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:.65rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; transition:border-color .2s,box-shadow .2s; }
    .search-box::placeholder{color:var(--muted)}
    .search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(57,217,138,.1)}
    .filter-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); font-family:'Syne',sans-serif; font-size:.78rem; font-weight:700; letter-spacing:.04em; border-radius:10px; padding:.62rem 1rem; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .filter-btn:hover,.filter-btn.active{background:var(--card);color:var(--text);border-color:var(--accent)}
    .filter-btn.f-proceso.active{border-color:var(--st-proceso);color:var(--st-proceso)}
    .filter-btn.f-finalizado.active{border-color:var(--st-finalizado);color:var(--st-finalizado)}
    .filter-btn.f-contratado.active{border-color:var(--st-contratado);color:var(--st-contratado)}
    .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; animation:fadeIn .5s .3s both; }
    .table-head-bar { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.4rem; border-bottom:1px solid var(--border); }
    .table-head-bar h2{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
    .count-badge{background:rgba(57,217,138,.1);color:var(--accent);border:1px solid rgba(57,217,138,.2);border-radius:99px;padding:.2rem .65rem;font-size:.75rem;font-weight:700}
    .table-scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    thead th{background:var(--card2);color:var(--muted);font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.75rem 1rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr{border-bottom:1px solid rgba(30,34,48,.7);transition:background .15s;cursor:pointer}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(57,217,138,.04)}
    td{padding:.8rem 1rem;vertical-align:middle}
    .td-num{color:var(--muted);font-size:.78rem;width:40px}
    .td-empresa{font-weight:500;max-width:220px}
    .empresa-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .empresa-sub{font-size:.75rem;color:var(--muted);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fecha-range{display:flex;flex-direction:column;gap:.1rem}
    .fecha-inicio{font-size:.78rem;color:var(--accent)}
    .fecha-fin{font-size:.78rem;color:var(--muted)}
    .estado-badge{display:inline-flex;align-items:center;gap:.4rem;border-radius:99px;padding:.28rem .75rem;font-size:.75rem;font-weight:600;letter-spacing:.03em;white-space:nowrap}
    .estado-badge::before{content:'';width:6px;height:6px;border-radius:50%}
    .estado-pendiente{background:rgba(107,114,128,.12);color:var(--st-pendiente);border:1px solid rgba(107,114,128,.2)}
    .estado-pendiente::before{background:var(--st-pendiente)}
    .estado-proceso{background:rgba(245,166,35,.12);color:var(--st-proceso);border:1px solid rgba(245,166,35,.2)}
    .estado-proceso::before{background:var(--st-proceso)}
    .estado-finalizado{background:rgba(91,140,255,.12);color:var(--st-finalizado);border:1px solid rgba(91,140,255,.2)}
    .estado-finalizado::before{background:var(--st-finalizado)}
    .estado-contratado{background:rgba(57,217,138,.12);color:var(--st-contratado);border:1px solid rgba(57,217,138,.2)}
    .estado-contratado::before{background:var(--st-contratado);animation:blink 1.5s ease-in-out infinite}
    .td-aplicado{text-align:center}
    .check-aplicado{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:transparent;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
    .check-aplicado.activo{background:var(--accent);border-color:var(--accent)}
    .check-aplicado.activo::after{content:'✓';color:#0a0c10;font-size:.75rem;font-weight:800}
    .td-accion{text-align:right}
    .btn-gestionar{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.04em;border-radius:8px;padding:.35rem .75rem;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn-gestionar:hover{border-color:var(--accent2);color:var(--accent2)}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
    .empty-state .icon{font-size:2.5rem;margin-bottom:.75rem}
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(5,7,10,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:520px;box-shadow:0 40px 100px rgba(0,0,0,.6);transform:scale(.95) translateY(20px);transition:transform .25s cubic-bezier(.16,1,.3,1);overflow:hidden}
    .modal-overlay.open .modal{transform:scale(1) translateY(0)}
    .modal-header{padding:1.4rem 1.6rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .modal-empresa{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;line-height:1.3}
    .modal-contacto{font-size:.82rem;color:var(--muted);margin-top:.3rem}
    .btn-close{background:var(--surface);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;font-size:1.1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:color .15s}
    .btn-close:hover{color:var(--danger)}
    .modal-body{padding:1.4rem 1.6rem;display:flex;flex-direction:column;gap:1.2rem}
    .modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .info-item{background:var(--surface);border-radius:10px;padding:.75rem}
    .info-item label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.3rem}
    .info-item p{font-size:.84rem;font-weight:500;word-break:break-all}
    .form-group label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.5rem;font-weight:500}
    .estado-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
    .estado-opt{border-radius:10px;padding:.65rem .5rem;text-align:center;cursor:pointer;border:2px solid var(--border);font-size:.78rem;font-weight:600;font-family:'Syne',sans-serif;transition:all .15s;color:var(--muted)}
    .estado-opt .opt-icon{font-size:1.1rem;display:block;margin-bottom:.2rem}
    .estado-opt:hover{border-color:var(--muted);color:var(--text)}
    .estado-opt.selected-proceso{border-color:var(--st-proceso);color:var(--st-proceso);background:rgba(245,166,35,.08)}
    .estado-opt.selected-finalizado{border-color:var(--st-finalizado);color:var(--st-finalizado);background:rgba(91,140,255,.08)}
    .estado-opt.selected-contratado{border-color:var(--st-contratado);color:var(--st-contratado);background:rgba(57,217,138,.08)}
    .aplicado-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:.8rem 1rem;cursor:pointer;transition:border-color .15s}
    .aplicado-toggle:hover{border-color:var(--accent)}
    .aplicado-toggle.on{border-color:var(--accent);background:rgba(57,217,138,.06)}
    .toggle-label{font-size:.88rem;font-weight:500}
    .toggle-switch{width:42px;height:24px;border-radius:99px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
    .toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
    .aplicado-toggle.on .toggle-switch{background:var(--accent)}
    .aplicado-toggle.on .toggle-switch::after{transform:translateX(18px)}
    textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:.8rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;resize:vertical;min-height:100px;transition:border-color .2s,box-shadow .2s}
    textarea::placeholder{color:var(--muted)}
    textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(91,140,255,.1)}
    .modal-footer{padding:.75rem 1.6rem 1.4rem;display:flex;gap:.75rem;justify-content:flex-end}
    .btn-cancelar{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;border-radius:10px;padding:.6rem 1.2rem;cursor:pointer;transition:color .15s,border-color .15s}
    .btn-cancelar:hover{color:var(--danger);border-color:var(--danger)}
    .btn-guardar{background:var(--accent);color:#0a0c10;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;border:none;border-radius:10px;padding:.65rem 1.5rem;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 18px rgba(57,217,138,.25)}
    .btn-guardar:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(57,217,138,.4)}
    .toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:.8rem 1.2rem;font-size:.85rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:.6rem;transform:translateY(20px);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}
    @media(max-width:768px){main{padding:1rem 1rem 3rem}.stats-bar{grid-template-columns:repeat(2,1fr)}header{padding:0 1rem}.header-title small{display:none}}
  </style>
</head>

<header>

    <div class="logo-pill"><div class="logo-dot"></div><span>SGVA</span></div>
    <div class="header-title">Oportunidades Laborales<small>ADSO · SENA 2026</small></div>
  </div>
  <div class="header-right">
    <div class="user-chip">
      <div class="user-avatar" id="avatar-initial">?</div>
      <span class="user-name" id="nombre-usuario">Cargando...</span>
    </div>
    <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  </div>
</header>
<main>
  <div class="stats-bar">
    <div class="stat-card"><span class="stat-label">Total empresas</span><span class="stat-value green" id="stat-total">0</span></div>
    <div class="stat-card"><span class="stat-label">Aplicadas</span><span class="stat-value blue" id="stat-aplicadas">0</span></div>
    <div class="stat-card"><span class="stat-label">En proceso</span><span class="stat-value orange" id="stat-proceso">0</span></div>
    <div class="stat-card"><span class="stat-label">Contratado</span><span class="stat-value grey" id="stat-contratado">0</span></div>
  </div>
  <div class="controls">
    <input class="search-box" type="text" id="buscador" placeholder="🔍  Buscar empresa, contacto o correo..." oninput="filtrar()"/>
    <button class="filter-btn active" onclick="filtrarEstado('todos')" id="f-todos">Todos</button>
    <button class="filter-btn f-proceso" onclick="filtrarEstado('proceso')" id="f-proceso">En proceso</button>
    <button class="filter-btn f-finalizado" onclick="filtrarEstado('finalizado')" id="f-finalizado">Finalizado</button>
    <button class="filter-btn f-contratado" onclick="filtrarEstado('contratado')" id="f-contratado">Contratado</button>
    <button class="filter-btn" onclick="filtrarEstado('aplicadas')" id="f-aplicadas">Aplicadas ✓</button>
  </div>
  <div class="table-wrap">
    <div class="table-head-bar">
      <h2>Registro de Empresas</h2>
      <span class="count-badge" id="count-visible">67 empresas</span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Empresa</th><th>Contacto</th><th>Teléfono</th>
            <th>Vigencia</th><th>Aplicó</th><th>Estado</th><th>Gestionar</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="cerrarModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-empresa" id="m-empresa">—</div>
        <div class="modal-contacto" id="m-contacto">—</div>
      </div>
      <button class="btn-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-info-grid">
        <div class="info-item"><label>Dirección</label><p id="m-dir">—</p></div>
        <div class="info-item"><label>Teléfono</label><p id="m-tel">—</p></div>
        <div class="info-item" style="grid-column:1/-1"><label>Correo</label><p id="m-correo">—</p></div>
      </div>
      <div>
        <label class="form-group" style="margin-bottom:.5rem"><span style="font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500">¿Ya apliqué?</span></label>
        <div class="aplicado-toggle" id="toggle-aplicado" onclick="toggleAplicado()">
          <span class="toggle-label" id="toggle-label">No he aplicado aún</span>
          <div class="toggle-switch"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Estado de la aplicación</label>
        <div class="estado-selector">
          <div class="estado-opt" id="opt-proceso" onclick="selEstado('proceso')"><span class="opt-icon">⏳</span>En proceso</div>
          <div class="estado-opt" id="opt-finalizado" onclick="selEstado('finalizado')"><span class="opt-icon">✅</span>Finalizado</div>
          <div class="estado-opt" id="opt-contratado" onclick="selEstado('contratado')"><span class="opt-icon">🎉</span>Contratado</div>
        </div>
      </div>
      <div class="form-group">
        <label>Notas / Descripción personal</label>
        <textarea id="modal-desc" placeholder="Escribe tus notas sobre esta oportunidad..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" onclick="guardarModal()">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span>✓</span><span id="toast-msg">Guardado</span></div>

let usuario='', registros={}, filtroActivo='todos', modalId=null, modalEstado=null, modalAplicado=false;

window.addEventListener('DOMContentLoaded', () => {
  usuario = localStorage.getItem('sgva_usuario');
  if (!usuario) { window.location.href = 'index.html'; return; }
  const raw = localStorage.getItem('sgva_registros');
  registros = raw ? JSON.parse(raw) : {};
  document.getElementById('nombre-usuario').textContent = usuario;
  document.getElementById('avatar-initial').textContent = usuario.charAt(0).toUpperCase();
  renderTabla(); actualizarStats();
});

function guardar() { localStorage.setItem('sgva_registros', JSON.stringify(registros)); }
function getReg(id) { return registros[id] || { aplicado:false, estado:null, descripcion:'' }; }

function renderTabla() {
  const busq  = document.getElementById('buscador').value.toLowerCase();
  const tbody = document.getElementById('tabla-body');
  const filtradas = EMPRESAS.filter(e => {
    const texto = `${e.empresa} ${e.contacto} ${e.correo}`.toLowerCase();
    if (busq && !texto.includes(busq)) return false;
    const reg = getReg(e.id);
    if (filtroActivo==='aplicadas')  return reg.aplicado;
    if (filtroActivo==='proceso')    return reg.estado==='proceso';
    if (filtroActivo==='finalizado') return reg.estado==='finalizado';
    if (filtroActivo==='contratado') return reg.estado==='contratado';
    return true;
  });
  document.getElementById('count-visible').textContent = `${filtradas.length} empresa${filtradas.length!==1?'s':''}`;
  if (!filtradas.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div>No se encontraron empresas.</div></td></tr>`;
    return;
  }
  const labels = {pendiente:'Sin estado',proceso:'En proceso',finalizado:'Finalizado',contratado:'Contratado'};
  tbody.innerHTML = filtradas.map((e,i) => {
    const reg = getReg(e.id); const est = reg.estado||'pendiente';
    return `<tr onclick="abrirModal(${e.id})">
      <td class="td-num">${i+1}</td>
      <td class="td-empresa"><div class="empresa-name" title="${e.empresa}">${e.empresa}</div><div class="empresa-sub">${e.correo}</div></td>
      <td>${e.contacto}</td><td>${e.telefono}</td>
      <td><div class="fecha-range"><span class="fecha-inicio">↑ ${e.fechaInicio}</span><span class="fecha-fin">↓ ${e.fechaFin}</span></div></td>
      <td class="td-aplicado" onclick="event.stopPropagation();toggleAplicadoDirecto(${e.id})">
        <div class="check-aplicado ${reg.aplicado?'activo':''}"></div>
      </td>
      <td><span class="estado-badge estado-${est}">${labels[est]}</span></td>
      <td class="td-accion" onclick="event.stopPropagation();abrirModal(${e.id})"><button class="btn-gestionar">Gestionar →</button></td>
    </tr>`;
  }).join('');
}

function actualizarStats() {
  const vals = Object.values(registros);
  document.getElementById('stat-total').textContent      = EMPRESAS.length;
  document.getElementById('stat-aplicadas').textContent  = vals.filter(r=>r.aplicado).length;
  document.getElementById('stat-proceso').textContent    = vals.filter(r=>r.estado==='proceso').length;
  document.getElementById('stat-contratado').textContent = vals.filter(r=>r.estado==='contratado').length;
}

function filtrar() { renderTabla(); }
function filtrarEstado(estado) {
  filtroActivo = estado;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`f-${estado}`)?.classList.add('active');
  renderTabla();
}

function toggleAplicadoDirecto(id) {
  const reg = getReg(id); reg.aplicado = !reg.aplicado; registros[id]=reg;
  guardar(); renderTabla(); actualizarStats();
  mostrarToast(reg.aplicado?'✓ Marcada como aplicada':'Marca removida');
}

function abrirModal(id) {
  const emp=EMPRESAS.find(e=>e.id===id), reg=getReg(id);
  modalId=id; modalEstado=reg.estado; modalAplicado=reg.aplicado;
  document.getElementById('m-empresa').textContent = emp.empresa;
  document.getElementById('m-contacto').textContent = `👤 ${emp.contacto}  ·  ✉ ${emp.correo}`;
  document.getElementById('m-dir').textContent  = emp.direccion;
  document.getElementById('m-tel').textContent  = emp.telefono;
  document.getElementById('m-correo').textContent = emp.correo;
  document.getElementById('modal-desc').value   = reg.descripcion||'';
  actualizarToggleUI(); actualizarEstadoUI();
  document.getElementById('modal-overlay').classList.add('open');
}
function cerrarModal() { document.getElementById('modal-overlay').classList.remove('open'); modalId=null; }
function cerrarModalOverlay(e) { if(e.target===document.getElementById('modal-overlay')) cerrarModal(); }

function toggleAplicado() { modalAplicado=!modalAplicado; actualizarToggleUI(); }
function actualizarToggleUI() {
  const t=document.getElementById('toggle-aplicado'), l=document.getElementById('toggle-label');
  modalAplicado ? (t.classList.add('on'), l.textContent='¡Ya apliqué a esta empresa!') : (t.classList.remove('on'), l.textContent='No he aplicado aún');
}

function selEstado(estado) { modalEstado = modalEstado===estado ? null : estado; actualizarEstadoUI(); }
function actualizarEstadoUI() {
  ['proceso','finalizado','contratado'].forEach(s => {
    const el=document.getElementById(`opt-${s}`);
    el.className='estado-opt';
    if(modalEstado===s) el.classList.add(`selected-${s}`);
  });
}

function guardarModal() {
  if(!modalId) return;
  registros[modalId]={ aplicado:modalAplicado, estado:modalEstado, descripcion:document.getElementById('modal-desc').value.trim() };
  guardar(); renderTabla(); actualizarStats(); cerrarModal();
  mostrarToast('✓ Cambios guardados correctamente');
}

let toastTimer;
function mostrarToast(msg) {
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show'); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

function cerrarSesion() { localStorage.removeItem('sgva_usuario'); window.location.href='index.html'; }
</script>
